<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Área do Aluno | Mentoria Nasdaq Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
  --bg: #020617;
  --card: #0f172a;
  --border: rgba(255,255,255,.08);
  --border2: rgba(255,255,255,.13);
  --text: #e5e7eb;
  --text-muted: #64748b;
  --text-dim: #94a3b8;
  --accent: #22c55e;
  --accent2: rgba(34,197,94,0.12);
  --blue: #3b82f6;
  --red: #ef4444;
  --indigo: #6366f1;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; min-height:100vh; }

/* HEADER */
header { background:rgba(2,6,23,0.88); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:0 24px; height:60px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:200; }
.header-left { display:flex; align-items:center; gap:10px; }
.header-logo { font-size:15px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header-right { display:flex; align-items:center; gap:10px; }
.avatar-header { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--indigo),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#fff; cursor:pointer; overflow:hidden; border:2px solid transparent; transition:border-color .2s; flex-shrink:0; }
.avatar-header:hover { border-color:var(--indigo); }
.avatar-header img { width:100%; height:100%; object-fit:cover; }
.btn-logout { background:transparent; color:var(--text-muted); border:1px solid var(--border); padding:7px 14px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; }
.btn-logout:hover { color:var(--text); border-color:var(--border2); }

/* LAYOUT */
.layout { max-width:680px; margin:0 auto; padding:0 16px 80px; }

/* WELCOME */
.welcome-strip { margin:20px 0 16px; padding:16px 20px; background:linear-gradient(135deg,rgba(34,197,94,.07),rgba(59,130,246,.07)); border:1px solid rgba(34,197,94,.15); border-radius:14px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.welcome-strip h2 { font-size:15px; font-weight:700; }
.welcome-strip p { font-size:13px; color:var(--text-muted); margin-top:2px; }
.live-badge { display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:var(--accent); white-space:nowrap; }
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); animation:pulseDot 1.6s ease-in-out infinite; }
@keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

/* QUICK ACCESS */
.quick-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
.quick-btn { background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:12px; padding:14px 8px; cursor:pointer; transition:all .25s; text-align:center; color:var(--text); user-select:none; }
.quick-btn:hover { background:rgba(255,255,255,.08); border-color:var(--accent); transform:translateY(-2px); }
.quick-btn-icon { font-size:22px; margin-bottom:6px; }
.quick-btn-label { font-size:11px; font-weight:700; color:var(--text-dim); }

/* FILTER BAR */
.filter-bar { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; margin-bottom:16px; scrollbar-width:none; }
.filter-bar::-webkit-scrollbar { display:none; }
.filter-chip { background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--text-muted); padding:7px 14px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; transition:all .2s; flex-shrink:0; }
.filter-chip:hover { color:var(--text); border-color:var(--border2); }
.filter-chip.active { background:var(--accent); color:#000; border-color:var(--accent); }

/* FEED HEADER */
.feed-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.feed-title { font-size:16px; font-weight:800; }
.rt-badge { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--accent); font-weight:700; }
.rt-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulseDot 2s ease infinite; }

/* POST CARD — Twitter style */
.posts-feed { display:flex; flex-direction:column; }
.post-card { border-bottom:1px solid var(--border); padding:18px 0; animation:slideIn .35s ease both; }
.post-card:first-child { border-top:1px solid var(--border); }
.post-card:hover { background:rgba(255,255,255,.012); }
.post-card.new-item { animation:newIn .4s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes newIn { from{opacity:0;transform:translateY(-14px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }

.post-author-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.post-av { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--indigo),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800; color:#fff; flex-shrink:0; overflow:hidden; }
.post-av img { width:100%; height:100%; object-fit:cover; }
.post-author-info { flex:1; min-width:0; }
.post-author-name { font-size:14px; font-weight:800; }
.post-author-meta { display:flex; align-items:center; gap:6px; margin-top:2px; flex-wrap:wrap; }
.post-cat-pill { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--accent); background:var(--accent2); padding:2px 8px; border-radius:10px; }
.post-time { font-size:11px; color:var(--text-muted); }
.post-time::before { content:'·'; margin-right:5px; }

.post-body { padding-left:50px; }
.post-title { font-size:15px; font-weight:800; margin-bottom:7px; line-height:1.35; }
.post-text { font-size:14px; color:var(--text-dim); line-height:1.75; margin-bottom:12px; white-space:pre-wrap; }

.post-media { border-radius:14px; overflow:hidden; margin-bottom:12px; border:1px solid var(--border); }
.post-media img { width:100%; display:block; max-height:360px; object-fit:cover; cursor:pointer; transition:opacity .2s; }
.post-media img:hover { opacity:.9; }
.post-video-wrap { position:relative; padding-bottom:56.25%; background:#000; }
.post-video-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
.post-file-box { display:flex; align-items:center; gap:14px; padding:14px 16px; background:rgba(255,255,255,.04); border-radius:12px; margin-bottom:12px; border:1px solid var(--border); }

/* ACTION BAR */
.post-actions-bar { display:flex; align-items:center; gap:4px; padding-top:2px; }
.action-btn { display:flex; align-items:center; gap:6px; background:none; border:none; color:var(--text-muted); font-size:13px; font-weight:600; padding:7px 12px; border-radius:20px; cursor:pointer; transition:all .2s; }
.action-btn:hover { color:var(--blue); background:rgba(59,130,246,.08); }
.action-btn.active { color:var(--blue); }
.action-btn svg { width:16px; height:16px; flex-shrink:0; }
.action-link { margin-left:auto; background:var(--accent); color:#000; border:none; padding:7px 18px; border-radius:20px; font-size:12px; font-weight:800; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:5px; transition:all .2s; }
.action-link:hover { background:#16a34a; transform:scale(1.04); }

/* COMMENTS SECTION */
.comments-section { padding-left:50px; display:none; margin-top:8px; }
.comments-inner { border-top:1px solid var(--border); padding-top:16px; animation:slideIn .2s ease; }

/* COMPOSE */
.compose-row { display:flex; gap:10px; align-items:flex-start; margin-bottom:16px; }
.compose-right { flex:1; }
.comment-textarea { width:100%; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:14px; padding:10px 14px; color:var(--text); font-family:inherit; font-size:14px; resize:none; min-height:80px; transition:all .2s; line-height:1.5; }
.comment-textarea:focus { outline:none; border-color:var(--blue); background:rgba(59,130,246,.04); box-shadow:0 0 0 3px rgba(59,130,246,.1); }
.comment-textarea::placeholder { color:var(--text-muted); }
.send-row { display:flex; justify-content:flex-end; margin-top:8px; }
.btn-send { background:var(--blue); color:#fff; border:none; padding:8px 20px; border-radius:20px; font-size:13px; font-weight:800; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:6px; }
.btn-send:hover { background:#2563eb; transform:scale(1.04); }
.btn-send:disabled { opacity:.5; cursor:not-allowed; transform:none; }

/* COMMENT ITEM */
.comment-list { display:flex; flex-direction:column; }
.comment-item { display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.04); animation:slideIn .3s ease both; }
.comment-item:last-child { border-bottom:none; }
.comment-item.new-item { animation:newIn .35s cubic-bezier(.34,1.56,.64,1) both; }
.comment-av { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--indigo),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#fff; flex-shrink:0; overflow:hidden; }
.comment-av img { width:100%; height:100%; object-fit:cover; }
.comment-body { flex:1; min-width:0; }
.comment-header { display:flex; align-items:center; gap:6px; margin-bottom:3px; flex-wrap:wrap; }
.comment-author { font-size:13px; font-weight:800; }
.comment-time { font-size:11px; color:var(--text-muted); }
.comment-text { font-size:13px; color:var(--text-dim); line-height:1.65; }
.comment-actions { display:flex; gap:6px; margin-top:5px; }
.c-btn { background:none; border:none; color:var(--text-muted); font-size:11px; font-weight:700; cursor:pointer; padding:3px 7px; border-radius:6px; transition:all .2s; }
.c-btn:hover { color:var(--blue); background:rgba(59,130,246,.08); }
.c-btn.del:hover { color:var(--red); background:rgba(239,68,68,.08); }

/* REPLIES */
.replies-wrap { margin-top:8px; padding-left:14px; border-left:2px solid rgba(99,102,241,.22); }
.reply-item { display:flex; gap:8px; align-items:flex-start; padding:7px 0; }
.reply-av { width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,var(--indigo),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:#fff; flex-shrink:0; overflow:hidden; }
.reply-av img { width:100%; height:100%; object-fit:cover; }
.reply-author { font-size:12px; font-weight:800; color:#a5b4fc; }
.reply-time { font-size:10px; color:var(--text-muted); margin-left:5px; }
.reply-text { font-size:12px; color:var(--text-dim); line-height:1.5; margin-top:2px; }

.reply-compose { display:none; margin-top:8px; }
.reply-compose.open { display:flex; gap:8px; align-items:flex-start; animation:slideIn .2s ease; }
.reply-ta { flex:1; background:rgba(255,255,255,.04); border:1px solid rgba(99,102,241,.3); border-radius:10px; padding:8px 12px; color:var(--text); font-family:inherit; font-size:13px; resize:none; min-height:50px; transition:all .2s; }
.reply-ta:focus { outline:none; border-color:var(--indigo); background:rgba(99,102,241,.04); }
.btn-reply-send { background:var(--indigo); color:#fff; border:none; padding:7px 14px; border-radius:16px; font-size:12px; font-weight:800; cursor:pointer; transition:all .2s; align-self:flex-end; white-space:nowrap; }
.btn-reply-send:hover { background:#4f46e5; }

/* EDIT */
.edit-form { display:none; margin-top:6px; }
.edit-form.open { display:block; animation:slideIn .2s ease; }
.edit-ta { width:100%; background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-family:inherit; font-size:13px; resize:vertical; min-height:52px; transition:all .2s; }
.edit-ta:focus { outline:none; border-color:var(--blue); }
.edit-actions { display:flex; gap:6px; margin-top:6px; justify-content:flex-end; }
.btn-xs { padding:5px 12px; border-radius:10px; font-size:11px; font-weight:700; cursor:pointer; border:1px solid var(--border); transition:all .2s; }
.btn-xs.p { background:var(--blue); color:#fff; border-color:var(--blue); }
.btn-xs.s { background:rgba(255,255,255,.05); color:var(--text-muted); }
.btn-xs:hover { opacity:.82; }

/* STATES */
.loading { text-align:center; padding:60px 20px; color:var(--text-muted); }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 14px; }
@keyframes spin { to{transform:rotate(360deg)} }
.empty-state { text-align:center; padding:60px 20px; }
.empty-icon { font-size:48px; margin-bottom:12px; }
.empty-state p { color:var(--text-muted); font-size:14px; }

/* IMAGE MODAL */
.image-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:10000; align-items:center; justify-content:center; padding:20px; cursor:pointer; }
.image-modal.active { display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.image-modal img { max-width:100%; max-height:90vh; object-fit:contain; border-radius:10px; }
.img-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.2); color:#fff; font-size:24px; width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; }
.img-close:hover { background:var(--red); transform:rotate(90deg); }

/* PROFILE MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--card); border:1px solid var(--border2); border-radius:20px; padding:32px; width:100%; max-width:420px; position:relative; }
.modal-close { position:absolute; top:16px; right:16px; background:none; border:none; color:var(--text-muted); font-size:22px; cursor:pointer; transition:color .2s; }
.modal-close:hover { color:var(--text); }
.avatar-big { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,var(--indigo),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:800; color:#fff; overflow:hidden; cursor:pointer; border:3px solid rgba(255,255,255,.08); transition:border-color .2s; margin:0 auto 8px; }
.avatar-big:hover { border-color:var(--indigo); }
.avatar-big img { width:100%; height:100%; object-fit:cover; }
.field-group { margin-bottom:14px; }
.field-group label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); margin-bottom:6px; }
.field-group input { width:100%; background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--text); font-size:14px; font-family:inherit; transition:all .2s; }
.field-group input:focus { outline:none; border-color:var(--indigo); }
.btn-save { width:100%; background:var(--indigo); color:#fff; border:none; padding:12px; border-radius:12px; font-size:15px; font-weight:800; cursor:pointer; margin-top:8px; transition:all .2s; }
.btn-save:hover { background:#4f46e5; }

/* TOAST */
.toast { position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-20px); background:var(--blue); color:#fff; padding:10px 22px; border-radius:20px; font-size:13px; font-weight:800; box-shadow:0 8px 24px rgba(0,0,0,.4); z-index:300; cursor:pointer; opacity:0; pointer-events:none; transition:all .3s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; }
.toast.show { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }

@media(max-width:640px) {
  .quick-row { grid-template-columns:repeat(2,1fr); }
  .post-body { padding-left:0; }
  .comments-section { padding-left:0; }
  .welcome-strip { flex-direction:column; align-items:flex-start; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span style="font-size:20px;">🧑‍🎓</span>
    <span class="header-logo">Mentoria Nasdaq Pro</span>
  </div>
  <div class="header-right">
    <div class="avatar-header" id="avatarHeader" onclick="abrirPerfil()" title="Meu perfil"><span id="avatarLetra">A</span></div>
    <span id="userName" onclick="abrirPerfil()" style="font-size:13px;font-weight:700;cursor:pointer;color:var(--text-dim);">Aluno</span>
    <button class="theme-toggle-btn" onclick="NasTheme.toggle()" title="Alternar tema"><span id="themeIcon">🌙</span></button>
    <button class="btn-logout" onclick="fazerLogout()">Sair</button>
  </div>
</header>

<div class="layout">
  <div class="welcome-strip">
    <div>
      <h2 id="welcomeMsg">Bem-vindo de volta! 👋</h2>
      <p>Confira as últimas análises e conteúdos exclusivos</p>
    </div>
    <div class="live-badge"><div class="live-dot"></div>AO VIVO</div>
  </div>

  <div class="quick-row">
    <div class="quick-btn" onclick="window.location.href='../'"><div class="quick-btn-icon">📊</div><div class="quick-btn-label">Dashboard</div></div>
    <div class="quick-btn" onclick="aplicarFiltro('sala-ao-vivo',null)"><div class="quick-btn-icon">🔴</div><div class="quick-btn-label">Sala ao Vivo</div></div>
    <div class="quick-btn" onclick="aplicarFiltro('materiais',null)"><div class="quick-btn-icon">📚</div><div class="quick-btn-label">Materiais</div></div>
    <div class="quick-btn" onclick="aplicarFiltro('link',null)"><div class="quick-btn-icon">🔗</div><div class="quick-btn-label">Links Úteis</div></div>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-chip active" onclick="aplicarFiltro('todos',this)">Todos</button>
    <button class="filter-chip" onclick="aplicarFiltro('sala-ao-vivo',this)">🔴 Sala ao Vivo</button>
    <button class="filter-chip" onclick="aplicarFiltro('materiais',this)">📚 Materiais</button>
    <button class="filter-chip" onclick="aplicarFiltro('analise',this)">📈 Análises</button>
    <button class="filter-chip" onclick="aplicarFiltro('tutorial',this)">🎓 Tutoriais</button>
    <button class="filter-chip" onclick="aplicarFiltro('noticia',this)">📰 Notícias</button>
    <button class="filter-chip" onclick="aplicarFiltro('link',this)">🔗 Links</button>
  </div>

  <div class="feed-header">
    <span class="feed-title">📰 Feed</span>
    <span class="rt-badge"><div class="rt-dot"></div>Tempo Real</span>
  </div>

  <div id="posts-feed" class="posts-feed">
    <div class="loading"><div class="spinner"></div><p>Carregando...</p></div>
  </div>
</div>

<div class="toast" id="toast" onclick="irParaTopo()">↑ Nova publicação</div>

<div class="image-modal" id="imageModal" onclick="fecharImagem()">
  <span class="img-close">×</span>
  <img id="modalImg" src="" alt="" onclick="event.stopPropagation()">
</div>

<div class="modal-overlay" id="modalPerfil">
  <div class="modal-box">
    <button class="modal-close" onclick="fecharPerfil()">×</button>
    <p style="font-size:17px;font-weight:800;margin-bottom:22px;">✏️ Meu Perfil</p>
    <div style="text-align:center;margin-bottom:20px;">
      <div class="avatar-big" id="avatarBig" onclick="document.getElementById('inputFoto').click()"><span id="avatarBigLetra">A</span></div>
      <input type="file" id="inputFoto" accept="image/*" style="display:none" onchange="previsualizarFoto(this)">
      <span style="font-size:12px;color:var(--text-muted);">Clique no avatar para trocar foto</span>
    </div>
    <div class="field-group"><label>Nome</label><input type="text" id="inputNome" placeholder="Seu nome"></div>
    <div class="field-group"><label>E-mail</label><input type="text" id="inputEmail" disabled style="opacity:.4;cursor:not-allowed;"></div>
    <button class="btn-save" onclick="salvarPerfil()">💾 Salvar Perfil</button>
    <p id="msgPerfil" style="text-align:center;margin-top:10px;font-size:13px;color:var(--accent);display:none;"></p>
  </div>
</div>

<script src="theme.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
'use strict';
let usuarioAtual = null;
let filtroAtual = 'todos';
let postsCache = [];
let _unsubPosts = null;
const _unsubComents = {};
let isFirstLoad = true;

const catLabels = { 'sala-ao-vivo':'🔴 Sala ao Vivo','materiais':'📚 Materiais','analise':'📈 Análise','tutorial':'🎓 Tutorial','noticia':'📰 Notícia','link':'🔗 Link' };

// ── AUTH ──
auth.onAuthStateChanged(async (user) => {
  if (!user) { location.href='login.html'; return; }
  try {
    const snap = await db.collection('users').doc(user.uid).get();
    if (!snap.exists) { await auth.signOut(); location.href='login.html'; return; }
    const d = snap.data();
    if (d.role==='admin') { location.href='admin.html'; return; }
    if (d.aprovado!==true) { alert('⏳ Conta aguarda aprovação.'); await auth.signOut(); location.href='login.html'; return; }
    usuarioAtual = { uid:user.uid, nome:d.nome||user.email.split('@')[0], email:user.email, fotoUrl:d.fotoUrl||null };
    document.getElementById('userName').textContent = usuarioAtual.nome;
    document.getElementById('welcomeMsg').textContent = `Bem-vindo de volta, ${usuarioAtual.nome.split(' ')[0]}! 👋`;
    atualizarAvatarUI();
    iniciarFeed();
  } catch(e) {
    usuarioAtual = { uid:user.uid, nome:user.email.split('@')[0], email:user.email, fotoUrl:null };
    iniciarFeed();
  }
});

// ── FEED REALTIME ──
function iniciarFeed() {
  if (_unsubPosts) _unsubPosts();
  const feed = document.getElementById('posts-feed');

  _unsubPosts = db.collection('posts').orderBy('criadoEm','desc')
    .onSnapshot(snap => {
      const wasEmpty = isFirstLoad;
      isFirstLoad = false;
      const idsAntes = new Set(postsCache.map(p=>p.id));

      snap.docChanges().forEach(change => {
        if (change.type==='added' && !wasEmpty && !idsAntes.has(change.doc.id)) {
          mostrarToast();
        }
        if (change.type==='removed') {
          const el = document.getElementById('card-'+change.doc.id);
          if (el) { el.style.transition='all .3s'; el.style.opacity='0'; el.style.transform='translateX(-8px)'; setTimeout(()=>el.remove(),300); }
          if (_unsubComents[change.doc.id]) { _unsubComents[change.doc.id](); delete _unsubComents[change.doc.id]; }
        }
      });

      postsCache = snap.docs.map(d=>({id:d.id,...d.data()}));
      renderFeed();
    }, err => {
      feed.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Erro ao carregar. Recarregue a página.</p></div>';
    });
}

// ── RENDER FEED ──
function renderFeed() {
  const feed = document.getElementById('posts-feed');
  const posts = filtroAtual==='todos' ? postsCache : postsCache.filter(p=>p.categoria===filtroAtual);

  if (posts.length===0) {
    feed.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>${postsCache.length===0?'Nenhuma publicação ainda.':'Nenhuma publicação nesta categoria.'}</p></div>`;
    return;
  }

  const existingIds = new Set([...feed.querySelectorAll('.post-card')].map(el=>el.id.replace('card-','')));

  // Remove cards fora do filtro
  feed.querySelectorAll('.post-card').forEach(el => {
    if (!posts.find(p=>p.id===el.id.replace('card-',''))) el.remove();
  });

  // Limpa loader se presente
  feed.querySelector('.loading')?.remove();
  feed.querySelector('.empty-state')?.remove();

  // Insere cards novos na ordem correta
  posts.forEach((post, idx) => {
    if (document.getElementById('card-'+post.id)) return; // já existe
    const card = document.createElement('div');
    card.className = 'post-card' + (existingIds.size>0 ? ' new-item' : '');
    card.id = 'card-'+post.id;
    card.style.animationDelay = existingIds.size>0 ? '0ms' : (idx*55)+'ms';
    card.innerHTML = buildPostHTML(post);
    feed.appendChild(card);
  });
}

// ── BUILD POST HTML ──
function buildPostHTML(post) {
  const ts = post.criadoEm ? (post.criadoEm.toDate ? post.criadoEm.toDate() : new Date(post.criadoEm)) : new Date();
  const catLabel = catLabels[post.categoria]||'Geral';

  let midiaHTML = '';
  if (post.youtubeEmbedURL) {
    midiaHTML = `<div class="post-media"><div class="post-video-wrap"><iframe src="${post.youtubeEmbedURL}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div></div>`;
  } else if (post.midiaURL && post.midiaTipo==='video') {
    const m = post.midiaURL.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (m) midiaHTML = `<div class="post-media"><div class="post-video-wrap"><iframe src="https://drive.google.com/file/d/${m[1]}/preview" allow="autoplay;fullscreen" allowfullscreen></iframe></div></div>`;
  } else if (post.midiaURL && post.midiaTipo==='pdf') {
    const url = post.driveFileId ? `https://drive.google.com/uc?export=download&id=${post.driveFileId}` : post.midiaURL;
    midiaHTML = `<div class="post-file-box"><span style="font-size:28px;">📄</span><div style="flex:1;"><strong style="font-size:13px;font-weight:700;display:block;">Arquivo anexado</strong><span style="font-size:11px;color:var(--text-muted);">Clique para baixar</span></div><a href="${url}" download target="_blank" style="background:var(--accent);color:#000;border:none;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:800;text-decoration:none;">📥 Baixar</a></div>`;
  } else if (post.midiaURL) {
    midiaHTML = `<div class="post-media"><img src="${post.midiaURL}" alt="" onclick="abrirImagem('${post.midiaURL}')" loading="lazy" onerror="this.closest('.post-media').remove()"></div>`;
  }

  const avHTML = mkAv('Admin', null, 40, 'post-av');

  return `
    <div class="post-author-row">
      ${avHTML}
      <div class="post-author-info">
        <div class="post-author-name">${post.autor||'Admin'}</div>
        <div class="post-author-meta">
          <span class="post-cat-pill">${catLabel}</span>
          <span class="post-time">${tempoRelativo(ts)}</span>
        </div>
      </div>
    </div>
    <div class="post-body">
      ${midiaHTML}
      <div class="post-title">${post.titulo||''}</div>
      ${post.texto ? `<div class="post-text">${post.texto}</div>` : ''}
      <div class="post-actions-bar">
        <button class="action-btn" id="btn-coment-${post.id}" onclick="toggleComentarios('${post.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span id="count-${post.id}"></span>
        </button>
        ${post.link ? `<a href="${post.link}" target="_blank" class="action-link">🔗 Acessar</a>` : ''}
      </div>
    </div>
    <div id="comments-${post.id}" class="comments-section">
      <div class="comments-inner">
        <div class="compose-row">
          ${mkAv(usuarioAtual?usuarioAtual.nome:'A', usuarioAtual?usuarioAtual.fotoUrl:null, 34, 'comment-av')}
          <div class="compose-right">
            <textarea class="comment-textarea" id="ta-${post.id}" placeholder="Adicione um comentário..." rows="2" onkeydown="sendOnEnter(event,'${post.id}')"></textarea>
            <div class="send-row">
              <button class="btn-send" id="sbtn-${post.id}" onclick="enviarComentario('${post.id}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg> Enviar
              </button>
            </div>
          </div>
        </div>
        <div class="comment-list" id="lista-${post.id}"></div>
      </div>
    </div>`;
}

function sendOnEnter(e, postId) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); enviarComentario(postId); }
}

// ── TOGGLE COMENTÁRIOS ──
function toggleComentarios(postId) {
  const sec = document.getElementById('comments-'+postId);
  const btn = document.getElementById('btn-coment-'+postId);
  const isOpen = sec.style.display==='block';
  if (isOpen) {
    sec.style.display='none';
    btn.classList.remove('active');
    if (_unsubComents[postId]) { _unsubComents[postId](); delete _unsubComents[postId]; }
  } else {
    sec.style.display='block';
    btn.classList.add('active');
    iniciarListenerComentarios(postId);
    setTimeout(()=>document.getElementById('ta-'+postId)?.focus(), 80);
  }
}

// ── LISTENER COMENTÁRIOS ──
function iniciarListenerComentarios(postId) {
  if (_unsubComents[postId]) return;
  const lista = document.getElementById('lista-'+postId);
  const countEl = document.getElementById('count-'+postId);
  lista.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text-muted);font-size:13px;">Carregando...</div>';

  const unsub = db.collection('posts').doc(postId).collection('comentarios')
    .orderBy('criadoEm','asc')
    .onSnapshot(snap => {
      if (countEl) countEl.textContent = snap.size>0 ? snap.size : '';

      if (snap.empty) {
        lista.innerHTML = '<p style="text-align:center;padding:14px;color:var(--text-muted);font-size:13px;">Nenhum comentário ainda. Seja o primeiro! 👇</p>';
        return;
      }

      const existingIds = new Set([...lista.querySelectorAll('.comment-item')].map(el=>el.id.replace('ci-','')));
      const snapIds = new Set(snap.docs.map(d=>d.id));

      // Remove deletados
      lista.querySelectorAll('.comment-item').forEach(el => {
        const id = el.id.replace('ci-','');
        if (!snapIds.has(id)) { el.style.transition='all .25s'; el.style.opacity='0'; el.style.transform='translateX(-6px)'; setTimeout(()=>el.remove(),250); }
      });

      // Adiciona/atualiza
      snap.forEach(doc => {
        const data = doc.data();
        let el = document.getElementById('ci-'+doc.id);
        if (el) {
          // Atualiza texto e respostas
          const tEl = el.querySelector('[data-text]');
          if (tEl) tEl.innerHTML = data.texto + (data.editadoEm ? '<span style="font-size:10px;color:#475569;margin-left:5px;">(editado)</span>' : '');
          const rWrap = document.getElementById('rp-'+doc.id);
          if (rWrap) rWrap.innerHTML = buildRepliesHTML(postId, doc.id, data.respostas||[]);
        } else {
          el = document.createElement('div');
          el.className = 'comment-item' + (existingIds.size>0 ? ' new-item' : '');
          el.id = 'ci-'+doc.id;
          el.innerHTML = buildComentarioHTML(postId, doc.id, data);
          lista.appendChild(el);
          // Limpa loader/empty
          lista.querySelector('[style*="padding:12px"]')?.remove();
          lista.querySelector('p')?.remove();
        }
      });
    }, err => {
      lista.innerHTML = '<p style="color:var(--red);padding:12px;font-size:13px;">Erro ao carregar comentários.</p>';
    });

  _unsubComents[postId] = unsub;
}

// ── BUILD COMENTÁRIO ──
function buildComentarioHTML(postId, docId, data) {
  const ts = data.criadoEm ? (data.criadoEm.toDate ? data.criadoEm.toDate() : new Date(data.criadoEm)) : new Date();
  const isOwner = usuarioAtual && data.autorId===usuarioAtual.uid;
  const nome = isOwner ? usuarioAtual.nome : (data.autor||'Aluno');
  const foto = isOwner ? usuarioAtual.fotoUrl : (data.fotoUrl||null);

  return `
    ${mkAv(nome, foto, 32, 'comment-av')}
    <div class="comment-body">
      <div class="comment-header">
        <span class="comment-author">${nome}</span>
        <span class="comment-time">${tempoRelativo(ts)}</span>
      </div>
      <div class="comment-text" data-text="1">${data.texto}${data.editadoEm ? '<span style="font-size:10px;color:#475569;margin-left:5px;">(editado)</span>' : ''}</div>
      <div class="edit-form" id="ef-${docId}">
        <textarea class="edit-ta" id="eta-${docId}">${data.texto}</textarea>
        <div class="edit-actions">
          <button class="btn-xs s" onclick="cancelarEdicao('${docId}')">Cancelar</button>
          <button class="btn-xs p" onclick="salvarEdicao('${postId}','${docId}')">Salvar</button>
        </div>
      </div>
      <div class="comment-actions">
        <button class="c-btn" onclick="mostrarResposta('${postId}','${docId}')">↩ Responder</button>
        ${isOwner ? `
          <button class="c-btn" onclick="editarComentario('${docId}')">✏️ Editar</button>
          <button class="c-btn del" onclick="deletarComentario('${postId}','${docId}')">🗑️</button>
        ` : ''}
      </div>
      <div class="reply-compose" id="rf-${docId}">
        ${mkAv(usuarioAtual?usuarioAtual.nome:'A', usuarioAtual?usuarioAtual.fotoUrl:null, 26, 'reply-av')}
        <textarea class="reply-ta" id="rta-${docId}" placeholder="Responder..." rows="2" onkeydown="replyOnEnter(event,'${postId}','${docId}')"></textarea>
        <div style="display:flex;flex-direction:column;gap:4px;align-self:flex-end;">
          <button class="btn-reply-send" onclick="enviarResposta('${postId}','${docId}')">↩ Enviar</button>
          <button onclick="ocultarResposta('${docId}')" style="background:none;border:none;color:var(--text-muted);font-size:11px;cursor:pointer;padding:2px 4px;">Cancelar</button>
        </div>
      </div>
      <div class="replies-wrap" id="rp-${docId}">
        ${buildRepliesHTML(postId, docId, data.respostas||[])}
      </div>
    </div>`;
}

function buildRepliesHTML(postId, comentarioId, respostas) {
  if (!respostas||!respostas.length) return '';
  return respostas.map((r,idx) => {
    const isOwner = usuarioAtual && r.autorId===usuarioAtual.uid;
    const nome = isOwner ? usuarioAtual.nome : (r.autor||'?');
    const foto = isOwner ? usuarioAtual.fotoUrl : (r.fotoUrl||null);
    const tempo = r.criadoEm ? tempoRelativo(new Date(r.criadoEm)) : 'agora';
    return `<div class="reply-item">
      ${mkAv(nome, foto, 26, 'reply-av')}
      <div style="flex:1;min-width:0;">
        <span class="reply-author">${nome}</span><span class="reply-time">${tempo}</span>
        <div class="reply-text">${r.texto}</div>
        ${isOwner ? `<button class="c-btn del" style="font-size:11px;margin-top:3px;" onclick="deletarResposta('${postId}','${comentarioId}',${idx})">🗑️</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function replyOnEnter(e, postId, comentarioId) {
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); enviarResposta(postId,comentarioId); }
}

// ── ENVIAR COMENTÁRIO ──
async function enviarComentario(postId) {
  if (!usuarioAtual) { alert('Você precisa estar logado.'); return; }
  const ta = document.getElementById('ta-'+postId);
  const btn = document.getElementById('sbtn-'+postId);
  const texto = ta.value.trim();
  if (!texto) { ta.focus(); ta.style.borderColor='var(--red)'; ta.style.boxShadow='0 0 0 3px rgba(239,68,68,.15)'; setTimeout(()=>{ta.style.borderColor='';ta.style.boxShadow='';},900); return; }
  ta.disabled=true;
  if (btn) { btn.disabled=true; btn.innerHTML='<span style="display:inline-block;animation:spin .6s linear infinite;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;width:14px;height:14px;"></span>'; }
  try {
    await db.collection('posts').doc(postId).collection('comentarios').add({
      texto, autor:usuarioAtual.nome, autorId:usuarioAtual.uid,
      fotoUrl:usuarioAtual.fotoUrl||null,
      criadoEm:firebase.firestore.FieldValue.serverTimestamp()
    });
    ta.value='';
  } catch(e) { alert('Erro ao enviar. Tente novamente.'); }
  finally {
    ta.disabled=false;
    if (btn) { btn.disabled=false; btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg> Enviar'; }
  }
}

// ── RESPOSTAS ──
function mostrarResposta(postId, comentarioId) {
  document.querySelectorAll('.reply-compose').forEach(el=>el.classList.remove('open'));
  const rf = document.getElementById('rf-'+comentarioId);
  if (rf) { rf.classList.add('open'); document.getElementById('rta-'+comentarioId)?.focus(); }
}
function ocultarResposta(comentarioId) {
  document.getElementById('rf-'+comentarioId)?.classList.remove('open');
}
async function enviarResposta(postId, comentarioId) {
  if (!usuarioAtual) return;
  const ta = document.getElementById('rta-'+comentarioId);
  const texto = ta.value.trim();
  if (!texto) { ta.focus(); return; }
  try {
    ta.disabled=true;
    await db.collection('posts').doc(postId).collection('comentarios').doc(comentarioId).update({
      respostas: firebase.firestore.FieldValue.arrayUnion({ texto, autor:usuarioAtual.nome, autorId:usuarioAtual.uid, fotoUrl:usuarioAtual.fotoUrl||null, criadoEm:new Date().toISOString() })
    });
    ta.value=''; ocultarResposta(comentarioId);
  } catch(e) { alert('Erro ao enviar resposta.'); }
  finally { ta.disabled=false; }
}
async function deletarResposta(postId, comentarioId, idx) {
  if (!confirm('Apagar esta resposta?')) return;
  try {
    const doc = await db.collection('posts').doc(postId).collection('comentarios').doc(comentarioId).get();
    const respostas = doc.data().respostas||[];
    respostas.splice(idx,1);
    await db.collection('posts').doc(postId).collection('comentarios').doc(comentarioId).update({respostas});
  } catch(e) { alert('Erro.'); }
}

// ── EDITAR / DELETAR ──
function editarComentario(docId) {
  document.querySelector(`#ci-${docId} [data-text]`).style.display='none';
  document.getElementById('ef-'+docId).classList.add('open');
  document.getElementById('eta-'+docId)?.focus();
}
function cancelarEdicao(docId) {
  document.querySelector(`#ci-${docId} [data-text]`).style.display='';
  document.getElementById('ef-'+docId).classList.remove('open');
}
async function salvarEdicao(postId, docId) {
  const ta = document.getElementById('eta-'+docId);
  const texto = ta.value.trim(); if (!texto) { ta.focus(); return; }
  try {
    await db.collection('posts').doc(postId).collection('comentarios').doc(docId).update({ texto, editadoEm:firebase.firestore.FieldValue.serverTimestamp() });
    cancelarEdicao(docId);
  } catch(e) { alert('Erro ao editar.'); }
}
async function deletarComentario(postId, docId) {
  if (!confirm('Apagar seu comentário?')) return;
  try { await db.collection('posts').doc(postId).collection('comentarios').doc(docId).delete(); }
  catch(e) { alert('Erro.'); }
}

// ── FILTRO ──
function aplicarFiltro(cat, btnEl) {
  filtroAtual=cat;
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  else document.querySelectorAll('.filter-chip').forEach(b=>{ if((b.getAttribute('onclick')||'').includes(`'${cat}'`)) b.classList.add('active'); });
  renderFeed();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── TOAST ──
let _toastT;
function mostrarToast() {
  const t=document.getElementById('toast'); t.classList.add('show');
  clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove('show'),5000);
}
function irParaTopo() { window.scrollTo({top:0,behavior:'smooth'}); document.getElementById('toast').classList.remove('show'); }

// ── AVATAR HELPERS ──
function mkAv(nome, fotoUrl, size, cls) {
  size=size||34; const letra=(nome||'A').charAt(0).toUpperCase(); const fs=Math.round(size*.38);
  if (fotoUrl) return `<div class="${cls}" style="width:${size}px;height:${size}px;flex-shrink:0;"><img src="${fotoUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='${letra}'"></div>`;
  return `<div class="${cls}" style="width:${size}px;height:${size}px;flex-shrink:0;font-size:${fs}px;">${letra}</div>`;
}

function atualizarAvatarUI() {
  const l = usuarioAtual.nome.charAt(0).toUpperCase();
  ['avatarLetra','avatarBigLetra'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=l;});
  if (usuarioAtual.fotoUrl) {
    ['avatarHeader','avatarBig'].forEach(id=>{const el=document.getElementById(id);if(!el)return;el.innerHTML=`<img src="${usuarioAtual.fotoUrl}" alt="">`;});
  }
}

// ── PERFIL ──
function abrirPerfil() {
  document.getElementById('inputNome').value=usuarioAtual.nome;
  document.getElementById('inputEmail').value=usuarioAtual.email||'';
  const big=document.getElementById('avatarBig');
  if(usuarioAtual.fotoUrl) big.innerHTML=`<img src="${usuarioAtual.fotoUrl}" alt="">`;
  else big.innerHTML=`<span id="avatarBigLetra">${usuarioAtual.nome.charAt(0).toUpperCase()}</span>`;
  document.getElementById('msgPerfil').style.display='none';
  document.getElementById('modalPerfil').classList.add('open');
}
function fecharPerfil() { document.getElementById('modalPerfil').classList.remove('open'); }
function previsualizarFoto(input) {
  const f=input.files[0]; if(!f) return;
  if(f.size>500*1024){alert('Foto muito grande. Máximo 500KB.');return;}
  const r=new FileReader(); r.onload=e=>{usuarioAtual._fotoTemp=e.target.result;document.getElementById('avatarBig').innerHTML=`<img src="${e.target.result}" alt="">`;};
  r.readAsDataURL(f);
}
async function salvarPerfil() {
  const nome=document.getElementById('inputNome').value.trim(); if(!nome){alert('Preencha o nome');return;}
  const msg=document.getElementById('msgPerfil');
  try {
    const u={nome}; if(usuarioAtual._fotoTemp) u.fotoUrl=usuarioAtual._fotoTemp;
    await db.collection('users').doc(usuarioAtual.uid).update(u);
    usuarioAtual.nome=nome; if(usuarioAtual._fotoTemp){usuarioAtual.fotoUrl=usuarioAtual._fotoTemp;delete usuarioAtual._fotoTemp;}
    document.getElementById('userName').textContent=nome; atualizarAvatarUI();
    msg.textContent='✅ Perfil salvo!'; msg.style.display='block'; setTimeout(fecharPerfil,1200);
  } catch(e){msg.textContent='❌ Erro ao salvar';msg.style.color='var(--red)';msg.style.display='block';}
}

// ── IMAGEM ──
function abrirImagem(url){document.getElementById('modalImg').src=url;document.getElementById('imageModal').classList.add('active');}
function fecharImagem(){document.getElementById('imageModal').classList.remove('active');document.getElementById('modalImg').src='';}

// ── TEMPO RELATIVO ──
function tempoRelativo(date) {
  if(!date) return '';
  const diff=Math.floor((Date.now()-date.getTime())/1000);
  if(diff<60) return 'agora mesmo';
  if(diff<3600) return `há ${Math.floor(diff/60)}min`;
  if(diff<86400) return `há ${Math.floor(diff/3600)}h`;
  if(diff<604800) return `há ${Math.floor(diff/86400)}d`;
  return date.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}

// ── LOGOUT ──
async function fazerLogout(){if(confirm('Deseja sair?')){await auth.signOut();location.href='login.html';}}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){fecharImagem();fecharPerfil();}});
</script>
